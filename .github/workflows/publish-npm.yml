name: Publish Tailwind Buddy to npm

on:
  push:
    tags:
      - "v*"

concurrency:
  group: npm-${{ github.ref }}
  cancel-in-progress: false

env:
  HUSKY: 0

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Set up Node and npm registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify tag matches package version
        run: node -e 'const version = require("./packages/core/package.json").version; if (process.env.GITHUB_REF_NAME !== "v" + version) { console.error("Tag must equal v" + version); process.exit(1); }'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repository
        run: pnpm verify

      - name: Publish with npm trusted publishing
        working-directory: packages/core
        run: npm publish --access public
